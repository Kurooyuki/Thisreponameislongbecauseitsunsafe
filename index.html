<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYSTEM LOCKED</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000; /* Hitam Pekat */
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Menghilangkan scroll */
        }

        .container {
            width: 90%;
            max-width: 380px;
            height: 95vh; /* Mengisi hampir seluruh tinggi layar */
            border: 2px solid #ff0000;
            display: flex;
            flex-direction: column;
            padding: 15px;
            background-color: #000000;
            border-radius: 8px;
            position: relative;
        }

        .header {
            color: #ff0000;
            text-align: center;
            font-weight: bold;
            font-size: 0.9rem;
            border-bottom: 1px solid #330000;
            padding-bottom: 10px;
        }

        .warning-icon {
            font-size: 3rem;
            text-align: center;
            margin: 10px 0;
            color: #ff0000;
        }

        h1 {
            font-size: 1.2rem;
            text-align: center;
            color: #ff0000;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .description {
            flex-grow: 1; /* Mengambil ruang kosong yang tersedia */
            font-size: 0.85rem;
            line-height: 1.3;
            color: #ddd;
            text-align: center;
            overflow: hidden;
        }

        .status-box {
            background: #111;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .timer-label {
            font-size: 0.7rem;
            color: #ff0000;
            text-align: center;
            margin-bottom: 5px;
        }

        .timer-box {
            font-family: 'Courier New', monospace;
            font-size: 2.2rem;
            color: #ffcc00;
            text-align: center;
            font-weight: bold;
        }

        .input-area {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: auto; /* Selalu di bagian bawah */
            padding-bottom: 5px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #ff0000;
            color: #00ff00;
            text-align: center;
            font-size: 1rem;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #ff0000;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        #message {
            text-align: center;
            font-size: 0.8rem;
            margin-top: 5px;
            min-height: 1.2em;
        }

        .success { color: #00ff00; }
        .error { color: #ffcc00; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">⚠ CRITICAL SYSTEM THREAT ⚠</div>
    
    <div class="warning-icon">☠</div>
    
    <h1>Files Encrypted</h1>
    
    <div class="description">
        <p>Your documents, photos, and system data are locked with high-level encryption.</p>
        <p style="margin-top: 10px;">To recover your data, enter the decryption key before the timer expires. Failure will result in permanent data loss.</p>
    </div>

    <div class="status-box">
        <div class="timer-label">TIME UNTIL DESTRUCTION</div>
        <div class="timer-box" id="timer">30:00:00</div>
    </div>

    <div class="input-area">
        <input type="text" id="keyInput" placeholder="Enter Decryption Key" autocomplete="off">
        <button onclick="checkKey()">Unlock Files</button>
        <p id="message"></p>
    </div>
</div>

<script>
    // Timer Logic (30 Hours)
    let totalSeconds = 30 * 60 * 60;
    const timerElement = document.getElementById('timer');

    function updateTimer() {
        let h = Math.floor(totalSeconds / 3600);
        let m = Math.floor((totalSeconds % 3600) / 60);
        let s = totalSeconds % 60;

        timerElement.textContent = 
            String(h).padStart(2, '0') + ":" + 
            String(m).padStart(2, '0') + ":" + 
            String(s).padStart(2, '0');

        if (totalSeconds > 0) {
            totalSeconds--;
        } else {
            clearInterval(timerInterval);
            timerElement.style.color = "#555";
        }
    }

    const timerInterval = setInterval(updateTimer, 1000);

    // Key Validation
    function checkKey() {
        const input = document.getElementById('keyInput').value;
        const msg = document.getElementById('message');

        if (input === "69420") {
            msg.className = "success";
            msg.innerHTML = "<b>KEY VALID.</b> Decrypting system...";
            clearInterval(timerInterval);
        } else {
            msg.className = "error";
            msg.textContent = "INVALID KEY. ACCESS DENIED.";
        }
    }
</script>

</body>
</html>
